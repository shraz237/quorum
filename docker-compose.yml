services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      POSTGRES_DB: trading
    ports:
      # Mapped to 5433 on host because the user already has a local postgres
      # listening on 5432. To psql in: psql -h 127.0.0.1 -p 5433 -U trading
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    # No host port mapping — redis is only used internally by other services
    # in the docker network. (Avoids conflict with any local redis-server.)
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  data-collector:
    build:
      context: .
      dockerfile: services/data-collector/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3

  sentiment:
    build:
      context: .
      dockerfile: services/sentiment/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      SERVICE_NAME: sentiment
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3

  analyzer:
    build:
      context: .
      dockerfile: services/analyzer/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3

  ai-brain:
    build:
      context: .
      dockerfile: services/ai-brain/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      SERVICE_NAME: ai-brain
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3

  notifier:
    build:
      context: .
      dockerfile: services/notifier/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3

  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    environment:
      CONTAINERS: 1   # GET /containers
      INFO: 1
      PING: 1
      VERSION: 1
      # Everything else stays at default 0 (denied)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
    ports:
      # Mapped to 8001 because user has another Python service on 8000.
      # Dashboard URL: http://127.0.0.1:8001
      - "127.0.0.1:8001:8000"
    depends_on:
      docker-proxy:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DOCKER_HOST: tcp://docker-proxy:2375
      SERVICE_NAME: dashboard
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
